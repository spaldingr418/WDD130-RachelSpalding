<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
        <section> 
          <table>
            <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>  
            </table>
          </section>
          <section>
            <form>
              <h1>Favorite Devotionals Form</h1>
              <h4>Please enter the following information:</h4>
              <input type="text" id="Speaker" placeholder="Speaker" required>
              <input type="text" id="Title" placeholder="Title" required>
              <input type="text" id="Location" placeholder="Location" required>
              <input type="year" id="Year" placeholder="Year" required>
              <button type="submit">Add to Table</button>
            </form>
          </section>        
      </div>
    </main>
  </div>
</body>
</html>
