<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body{
            background-image:url('images/christus.webp');
            background-size:contain;
            background-repeat:no-repeat;
            background-position:450px 20px;
            border-radius: 20px;
            border-color: black;
            width:auto;
            height:fit-content;
            color: #E8ECED;
            font-family: Arial;
        }
        h1{
            text-align:center;
            margin-top: 2%;
        }
        #eyring{
            max-height: 100px;
            border-radius:50%;
            border:solid 5px #E8ECED;
            margin: 10px;
        }
        #oaks{
            max-height: 130px;
            border-radius:50%;
            border:solid 5px #E8ECED;
        }
        #christofferson{
            max-height: 100px;
            border-radius:50%;
            border:solid 5px #E8ECED;
            margin: 10px;
        }
        h2{
            text-align:center;
        }
        #apostles{
            display: grid;
            justify-content:center;
            grid-template-columns: repeat(4, 100px);
            margin: auto;
            row-gap: 10px;
        }
        #grid{
            max-height:90px;
            border-radius:50%;
            border:solid 5px #E8ECED;
            margin:auto;
        }
    </style>
</head>
<body>
    <h1>First Presidency</h1>
        <div style="text-align: center">
            <img src="images/eyring.webp" alt="Henry B. Eyring" class id="eyring">
            <img src="images/oaks.webp" alt="Dallin H. Oaks" class id="oaks">
            <img src="images/christofferson.webp" alt="D. Todd Christofferson" class id="christofferson">
        </div>
    <h2>Quorum of the Twelve Apostles</h2>
        <div class id="apostles">
            <img src="images/uchtdorf.webp" alt="Dieter F. Uchtdorf" class id="grid">
            <img src="images/bednar.webp" alt="David A. Bednar" class id="grid">
            <img src="images/cook.webp" alt="Quentin L. Cook" class id="grid">
            <img src="images/anderson.webp" alt="Neil L. Andersen" class id="grid">
            <img src="images/rasband.webp" alt="Ronald A. Rasband" class id="grid">
            <img src="images/stevenson.webp" alt="Gary E. Stevenson" class id="grid">
            <img src="images/renlund.webp" alt="Dale G. Renlund" class id="grid">
            <img src="images/gong.webp" alt="Gerrit W. Gong" class id="grid">
            <img src="images/soares.webp" alt="Ulisses Soares" class id="grid">
            <img src="images/kearon.webp" alt="Patrick Kearon" class id="grid">
            <img src="images/causse.webp" alt="Gerald Causse" class id="grid">
            <img src="images/gilbert.webp" alt="Clark G. Gilbert" class id="grid">
        </div>
</body>
</html>
